spring:
  application:
    name: razorpayClone
  datasource:
    url: jdbc:postgresql://localhost:5432/razorpay_db
    username: asif
    password: razarpay@12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    info:
      env:
        enabled: true
      build:
        enabled: true
      git:
        enabled: true
      java:
        enabled: true
      os:
        enabled: true

    endpoint:
      env:
        show-values: always

  info:
    app:
      author: Asif Ali
      version: 1.0.0
      # documentation: https://AsifAli.com

  springdoc:
    api-docs:
      enabled: true